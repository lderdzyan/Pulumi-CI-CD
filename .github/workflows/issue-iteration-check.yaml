name: Detect removed iteration

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Project number to scan'
        required: false
        default: '1'
  schedule:
    - cron: "0 0 * * *"

permissions:
  repository-projects: read
  issues: write
  contents: read
jobs:
  detect-iteration-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Scan Project for removed Iterations
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const PROJECT_NUMBER = parseInt(context.payload.inputs?.project_number || '1', 10);
            const ITERATION_FIELD = "Iteration";
            const TRACK_LABEL = "had-iteration";

            console.log(`Scanning Project v2 number: ${PROJECT_NUMBER}`);

            const projectRes = await github.graphql(`
              query ($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository {
                              name
                              owner { login }
                            }
                          }
                        }
                        fieldValues(first: 100) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldIterationValue {
                              title
                              field { ... on ProjectV2FieldCommon { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, number: PROJECT_NUMBER });

            const items = projectRes.user.projectV2.items.nodes;

            for (const item of items) {
              // ✅ SAFE GUARD
              if (
                !item.content ||
                !item.content.repository ||
                !item.content.repository.owner
              ) {
                console.log(`Skipping item ${item.id}`);
                continue;
              }

              const issue_owner = item.content.repository.owner.login;
              const issue_repo = item.content.repository.name;
              const issue_number = item.content.number;

              // ✅ Detect iteration
              let iteration = null;

              for (const val of item.fieldValues.nodes) {
                if (
                  val.field?.name === ITERATION_FIELD &&
                  val.__typename === "ProjectV2ItemFieldIterationValue"
                ) {
                  iteration = val.title;
                }
              }

              // ✅ Get labels
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: issue_owner,
                repo: issue_repo,
                issue_number
              });

              const hasTrackingLabel = labels.some(l => l.name === TRACK_LABEL);

              // 🟢 CASE 1: iteration exists → mark it
              if (iteration) {
                console.log(`Issue #${issue_number} has iteration: ${iteration}`);

                if (!hasTrackingLabel) {
                  await github.rest.issues.addLabels({
                    owner: issue_owner,
                    repo: issue_repo,
                    issue_number,
                    labels: [TRACK_LABEL]
                  });
                  console.log(`Added tracking label to #${issue_number}`);
                }

                continue;
              }

              // 🔴 CASE 2: iteration missing
              if (!iteration && hasTrackingLabel) {
                console.log(`Iteration removed from #${issue_number}`);

                // check comments (prevent spam)
                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner: issue_owner,
                    repo: issue_repo,
                    issue_number
                  }
                );

                const alreadyCommented = comments.some(c =>
                  c.body.includes("Iteration was removed from this issue")
                );

                if (!alreadyCommented) {
                  await github.rest.issues.createComment({
                    owner: issue_owner,
                    repo: issue_repo,
                    issue_number,
                    body: "⚠️ Iteration was removed from this issue in the project."
                  });
                }

                continue;
              }

              // ⚪ CASE 3: never had iteration → ignore
              console.log(`Issue #${issue_number} never had iteration`);
            }